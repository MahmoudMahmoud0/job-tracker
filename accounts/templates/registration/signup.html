{% extends "base.html" %}
{% load tailwind_filters %}
{% load static %}
{% block content %}

<main class="min-h-screen flex flex-col justify-center p-4 md:p-8">
   <div class="w-full max-w-lg mx-auto sm:max-w-4xl">
      <div class="mb-12">
         <h1 class="mt-6 text-3xl font-semibold tracking-tight text-slate-800 md:text-4xl">Create your account and get started</h1>
         <p class="mt-3 max-w-xl text-sm leading-6 text-slate-600 md:text-base">Organize your applications in one place with a clean workflow and a calmer job search routine.</p>
      </div>

      <div class="max-w-lg mx-auto rounded-3xl border border-white/70 bg-white/80 p-6 shadow-[0_24px_80px_rgba(15,23,42,0.12)] backdrop-blur-xl md:p-8">
         <form method="post" onsubmit="showLoading(this)">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="flex justify-center">
               <button
                  id="signup-btn"
                  class="flex items-center justify-center gap-2 rounded-lg bg-blue-500 px-3 py-2 text-white disabled:cursor-not-allowed disabled:bg-blue-400 hover:bg-blue-600"
                  type="submit">
                  <span id="signup-text">Signup</span>
                  <svg
                     id="signup-spinner"
                     class="hidden h-5 w-5 animate-spin"
                     xmlns="http://www.w3.org/2000/svg"
                     fill="none"
                     viewBox="0 0 24 24">
                     <circle
                        class="opacity-25"
                        cx="12"
                        cy="12"
                        r="10"
                        stroke="currentColor"
                        stroke-width="4">
                     </circle>
                     <path
                        class="opacity-75"
                        fill="currentColor"
                        d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z">
                     </path>
                  </svg>
               </button>
            </div>
         </form>
      </div>
   </div>
</main>

<script src="{% static 'js/signup.js' %}"></script>

{% endblock content %}
