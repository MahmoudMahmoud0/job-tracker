{% extends "base.html" %}
{% load tailwind_filters %}
{% load static %}
{% block content %}

<main class="min-h-screen flex flex-col justify-center p-4 md:p-8">
   <div class="w-full max-w-lg mx-auto sm:max-w-4xl">
      <div class="mb-12">
         <h1 class="mt-6 text-3xl font-semibold tracking-tight text-slate-800 md:text-4xl">Create your account and get started</h1>
         <p class="mt-3 max-w-xl text-sm leading-6 text-slate-600 md:text-base">Organize your applications in one place with a clean workflow and a calmer job search routine.</p>
      </div>

      <div class="max-w-lg mx-auto rounded-3xl border border-white/70 bg-white/80 p-6 shadow-[0_24px_80px_rgba(15,23,42,0.12)] backdrop-blur-xl md:p-8">
         <form method="post">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="flex justify-center">
               <button
                  class="flex justify-center bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg text-white"
                  type="submit">Signup</button>
            </div>
         </form>
      </div>
   </div>
</main>

{% endblock content %}
