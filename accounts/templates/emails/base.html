<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Job Tracker{% endblock %}</title>
</head>

<body style="
    margin:0;
    padding:40px 20px;
    background:#f4f7fb;
    font-family:Arial, Helvetica, sans-serif;
    color:#0f172a;
">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0" style="
        width:100%;
        max-width:600px;
        background:#ffffff;
        border-radius:24px;
        overflow:hidden;
        box-shadow:0 24px 80px rgba(15,23,42,.12);
    ">

                    <tr>
                        <td align="center" style="padding:40px 30px 20px;">
                            <img src="cid:job_tracker_logo" alt="Job Tracker" width="220" style="display:block;">
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:0 40px 40px;">
                            {% block content %}
                            {% endblock %}
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="
        padding:20px;
        font-size:13px;
        color:#64748b;
        border-top:1px solid #e2e8f0;
    ">
                            &copy; {% now "Y" %} Job Tracker<br>
                            Track. Organize. Get Hired.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
